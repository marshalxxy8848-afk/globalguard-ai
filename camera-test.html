<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>相机测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; color: rgba(255,255,255,0.9); }
    p { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 32px; text-align: center; }
    button {
      width: 100%;
      max-width: 320px;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: #06b6d4;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.2s;
    }
    button:active { background: #0891b2; }
    #result {
      margin-top: 24px;
      width: 100%;
      max-width: 320px;
      text-align: center;
    }
    #result img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #result p {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }
    .note {
      margin-top: 24px;
      padding: 12px 16px;
      background: rgba(6,182,212,0.08);
      border: 1px solid rgba(6,182,212,0.2);
      border-radius: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      max-width: 320px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>📸 相机测试</h1>
  <p>点击下方按钮测试手机相机功能</p>

  <button id="cameraBtn">开始免费试用</button>

  <!-- 隐藏的相机输入 -->
  <input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none" />

  <div id="result"></div>
  <div id="info" class="note"></div>

  <script>
    const btn = document.getElementById('cameraBtn');
    const input = document.getElementById('cameraInput');
    const result = document.getElementById('result');
    const info = document.getElementById('info');

    // 显示设备信息
    const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isAndroid = /Android/.test(navigator.userAgent);
    info.textContent = `📱 设备: ${isIOS ? 'iOS' : isAndroid ? 'Android' : isTouch ? '触屏' : '桌面'} | `
      + `点击按钮后 ${isIOS ? 'iOS 会弹出"相机/相册"菜单，需再点一次"相机"' : '应该直接打开相机'}`;

    btn.addEventListener('click', () => {
      if (isTouch || isIOS) {
        input.click();
      } else {
        alert('请在手机上打开此页面测试相机功能');
      }
    });

    input.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      // 显示拍摄的照片
      const url = URL.createObjectURL(file);
      result.innerHTML = `
        <img src="${url}" alt="拍摄结果" />
        <p>✅ 拍摄成功！文件大小: ${(file.size / 1024).toFixed(1)}KB</p>
      `;
    });
  </script>
</body>
</html>
